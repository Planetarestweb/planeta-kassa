services:
  - type: web
    name: planeta-kassa
    env: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: kassa-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/kassa.db
      - key: NODE_ENV
        value: production
